name = "netpulse-worker"
main = "src/index.ts"
compatibility_date = "2024-11-01"

# The worker dev server runs on port 8787 by default.
# Vite is configured to proxy /api/* here during development,
# so you just run both servers and it works.
[dev]
port = 8787
local_protocol = "http"

# Production deployment config.
# Run: npm run deploy:production
[env.production]
name = "netpulse-worker-production"

# Staging for testing before you go live.
# Run: npm run deploy:staging
[env.staging]
name = "netpulse-worker-staging"

[build]
command = "npm run build"

# To bind this worker to your Pages domain so /api/* routes here automatically,
# go to: Cloudflare Dashboard → Pages → your project → Settings → Functions → Service bindings
# Add a binding: variable name = NETPULSE_API, service = netpulse-worker-production
#
# If you prefer a route-based approach instead, uncomment this and fill in your domain:
# [[routes]]
# pattern = "netpulse.eu.cc/api/*"
# zone_name = "netpulse.eu.cc"
